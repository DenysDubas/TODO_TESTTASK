<main class="min-h-screen bg-slate-100 py-10 px-4">
  <div class="mx-auto max-w-lg rounded-xl bg-white p-6 shadow-md">
    <h1 class="mb-6 text-2xl font-semibold text-slate-800">Todo List</h1>

    <form (ngSubmit)="addTask()" class="mb-6 flex gap-2">
      <input
        type="text"
        name="title"
        [(ngModel)]="newTitle"
        placeholder="New task..."
        class="flex-1 rounded-lg border border-slate-300 px-3 py-2 text-slate-800 outline-none focus:border-slate-500"
      />
      <button
        type="submit"
        class="rounded-lg bg-slate-800 px-4 py-2 text-white hover:bg-slate-700"
      >
        Add
      </button>
    </form>

    @if (error) {
      <p class="mb-4 rounded-lg bg-red-50 px-3 py-2 text-sm text-red-700">{{ error }}</p>
    }

    @if (tasks.length === 0 && !error) {
      <p class="text-center text-slate-500">No tasks yet.</p>
    } @else {
      <ul class="space-y-2">
        @for (task of tasks; track task.id) {
          <li
            class="flex items-center justify-between rounded-lg border border-slate-200 px-3 py-2"
          >
            <span
              class="text-slate-800"
              [class.line-through]="task.is_done"
              [class.text-slate-400]="task.is_done"
            >
              {{ task.title }}
            </span>
            <button
              type="button"
              (click)="removeTask(task.id)"
              class="rounded-md px-3 py-1 text-sm text-red-600 hover:bg-red-50"
            >
              Delete
            </button>
          </li>
        }
      </ul>
    }
  </div>
</main>
